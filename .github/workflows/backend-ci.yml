name: Backend CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Run unit tests
        run: ./mvnw test

  docker-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve CI JWT secret
        run: |
          if [ -n "${{ secrets.JWT_SECRET }}" ]; then
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> "$GITHUB_ENV"
          else
            echo "JWT_SECRET=ci-jwt-secret-please-change-this-in-production-1234567890" >> "$GITHUB_ENV"
          fi

      - name: Start Docker stack
        run: |
          docker compose up --build -d

      - name: Wait for liveness
        run: |
          for i in {1..24}; do
            status="$(curl -fsS http://localhost:8080/api/actuator/health/liveness | jq -r '.status' 2>/dev/null || true)"
            if [ "${status}" = "UP" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "Liveness did not reach UP in time"
          docker compose logs backend
          exit 1

      - name: Wait for readiness
        run: |
          for i in {1..24}; do
            curl -fsS http://localhost:8080/api/actuator/health/readiness -o readiness.json || true
            status="$(jq -r '.status // empty' readiness.json 2>/dev/null || true)"
            if [ "${status}" = "UP" ]; then
              cp readiness.json template_registry_health.json
              exit 0
            fi
            sleep 5
          done
          echo "Readiness did not reach UP in time"
          cat readiness.json || true
          docker compose logs backend
          exit 1

      - name: Smoke test tenant provisioning
        run: |
          system_user_id="$(docker exec az_erp_postgres psql -U az_erp -d az_erp -qAtX -v ON_ERROR_STOP=1 -c "INSERT INTO platform.system_users (nome, email, login, senha_hash, role, status) VALUES ('CI Provisioning', 'ci.provisioning@azerp.com', 'ci.provisioning', '\$2a\$10\$012345678901234567890uC8wN9QnAyY1Q0xF7v6V8M9dWQjG1z6K', 'ADMIN_SISTEMA', 'ATIVO') RETURNING id;" | head -n 1 | tr -d '[:space:]')"
          tenant_suffix="$(date +%Y%m%d%H%M%S)"
          tenant_code="TENANTCI${tenant_suffix}"
          database_name="tenant_ci_${tenant_suffix}"
          tenant_document="$(date +%y%m%d%H%M%S)90"
          admin_password="SenhaCITenant123"
          admin_new_password="SenhaCITenantNova123"
          token="$(SYSTEM_USER_ID="${system_user_id}" python - <<'PY'
          import base64
          import hashlib
          import hmac
          import json
          import os
          import time

          def b64url(data: bytes) -> str:
              return base64.urlsafe_b64encode(data).rstrip(b"=").decode("ascii")

          issued_at = int(time.time())
          expires_at = issued_at + 28800

          header = {"alg": "HS256", "typ": "JWT"}
          payload = {
              "iss": "az-erp-backend",
              "sub": "ci.provisioning",
              "userId": int(os.environ["SYSTEM_USER_ID"]),
              "role": "ADMIN_SISTEMA",
              "scope": "master",
              "iat": issued_at,
              "exp": expires_at,
          }

          header_b64 = b64url(json.dumps(header, separators=(",", ":")).encode("utf-8"))
          payload_b64 = b64url(json.dumps(payload, separators=(",", ":")).encode("utf-8"))
          unsigned = f"{header_b64}.{payload_b64}"
          signature = hmac.new(
              os.environ["JWT_SECRET"].encode("utf-8"),
              unsigned.encode("utf-8"),
              hashlib.sha256,
          ).digest()
          print(f"{unsigned}.{b64url(signature)}")
          PY
          )"

          provision_payload="$(cat <<EOF
          {
            "systemUserId": ${system_user_id},
            "codigo": "${tenant_code}",
            "nome": "Tenant CI ${tenant_suffix}",
            "nomeFantasia": "Tenant CI",
            "documento": "${tenant_document}",
            "tipoDocumento": "CNPJ",
            "emailResponsavel": "owner.ci@azerp.com",
            "telefoneResponsavel": "71999999999",
            "plano": "PROFESSIONAL",
            "databaseName": "${database_name}",
            "dbHost": "postgres",
            "dbPort": 5432,
            "dbUsername": "az_erp",
            "dbPassword": "az_erp",
            "adminNome": "Admin CI",
            "adminEmail": "admin.ci@tenant.com",
            "adminLogin": "admin.ci",
            "adminSenha": "${admin_password}"
          }
          EOF
          )"

          curl --fail-with-body -s \
            -X POST "http://localhost:8080/api/platform/tenantProvisioning" \
            -H "Authorization: Bearer ${token}" \
            -H "Content-Type: application/json" \
            -d "${provision_payload}" \
            | tee tenant_provisioning_response.json

          grep -q "\"tenantStatus\":\"ATIVO\"" tenant_provisioning_response.json
          grep -q "\"provisionStatus\":\"ATIVO\"" tenant_provisioning_response.json
          grep -q "\"TENANT_APP_USER_CREATED\"" tenant_provisioning_response.json

          tenant_login_payload="$(cat <<EOF
          {
            "tenantCode": "${tenant_code}",
            "login": "admin.ci",
            "senha": "${admin_password}"
          }
          EOF
          )"

          curl --fail-with-body -s \
            -X POST "http://localhost:8080/api/tenant/auth/login" \
            -H "Content-Type: application/json" \
            -d "${tenant_login_payload}" \
            -o tenant_login_response.json

          grep -q "\"scope\":\"tenant\"" tenant_login_response.json
          grep -q "\"login\":\"admin.ci\"" tenant_login_response.json
          grep -q "\"passwordChangeRequired\":true" tenant_login_response.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("tenant_login_response.json").read_text(encoding="utf-8"))
          summary = {
              "tenantId": payload.get("tenantId"),
              "tenantCode": payload.get("tenantCode"),
              "userId": payload.get("userId"),
              "login": payload.get("login"),
              "scope": payload.get("scope"),
              "passwordChangeRequired": payload.get("passwordChangeRequired"),
          }
          Path("tenant_login_summary.json").write_text(
              json.dumps(summary, ensure_ascii=False),
              encoding="utf-8",
          )
          Path("tenant_login_token.txt").write_text(payload["token"], encoding="utf-8")
          PY

          tenant_change_payload="$(cat <<EOF
          {
            "senhaAtual": "${admin_password}",
            "novaSenha": "${admin_new_password}"
          }
          EOF
          )"

          tenant_token="$(cat tenant_login_token.txt)"
          curl --fail-with-body -s \
            -X POST "http://localhost:8080/api/tenant/auth/change-password" \
            -H "Authorization: Bearer ${tenant_token}" \
            -H "Content-Type: application/json" \
            -d "${tenant_change_payload}" \
            -o tenant_change_password_response.json

          grep -q "Senha alterada com sucesso" tenant_change_password_response.json

          tenant_second_login_payload="$(cat <<EOF
          {
            "tenantCode": "${tenant_code}",
            "login": "admin.ci",
            "senha": "${admin_new_password}"
          }
          EOF
          )"

          curl --fail-with-body -s \
            -X POST "http://localhost:8080/api/tenant/auth/login" \
            -H "Content-Type: application/json" \
            -d "${tenant_second_login_payload}" \
            -o tenant_second_login_response.json

          grep -q "\"scope\":\"tenant\"" tenant_second_login_response.json
          grep -q "\"login\":\"admin.ci\"" tenant_second_login_response.json
          grep -q "\"passwordChangeRequired\":false" tenant_second_login_response.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("tenant_second_login_response.json").read_text(encoding="utf-8"))
          summary = {
              "tenantId": payload.get("tenantId"),
              "tenantCode": payload.get("tenantCode"),
              "userId": payload.get("userId"),
              "login": payload.get("login"),
              "scope": payload.get("scope"),
              "passwordChangeRequired": payload.get("passwordChangeRequired"),
          }
          Path("tenant_second_login_summary.json").write_text(
              json.dumps(summary, ensure_ascii=False),
              encoding="utf-8",
          )
          PY

          rm tenant_login_response.json tenant_login_token.txt tenant_second_login_response.json

      - name: Print running containers
        if: always()
        run: docker compose ps

      - name: Capture Docker logs
        if: always()
        run: |
          docker compose logs backend > backend-docker.log
          docker compose logs postgres > postgres-docker.log

      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-docker-logs
          path: |
            backend/backend-docker.log
            backend/postgres-docker.log
            backend/readiness.json
            backend/template_registry_health.json
            backend/tenant_provisioning_response.json
            backend/tenant_login_summary.json
            backend/tenant_change_password_response.json
            backend/tenant_second_login_summary.json

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v
