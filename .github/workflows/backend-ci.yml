name: Backend CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Run unit tests
        run: ./mvnw test

  docker-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Docker stack
        run: docker compose up --build -d

      - name: Wait for backend startup
        run: |
          for i in {1..24}; do
            if docker compose logs backend | grep -q "Started BackendApplication"; then
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not finish startup in time"
          docker compose logs backend
          exit 1

      - name: Verify template registry bootstrap
        run: |
          for i in {1..24}; do
            registry_status="$(docker exec az_erp_postgres psql -U az_erp -d az_erp -Atc "select coalesce(current_version, '') || '|' || status from platform.template_registry where database_name = 'az_erp_template';" 2>/dev/null || true)"
            if echo "$registry_status" | grep -q "READY"; then
              echo "$registry_status" | tee template_registry.txt
              exit 0
            fi
            sleep 5
          done
          echo "Template registry did not reach READY in time"
          docker compose logs backend
          docker exec az_erp_postgres psql -U az_erp -d az_erp -Atc "select database_name, current_version, status, lock_active from platform.template_registry;" || true
          exit 1

      - name: Smoke test tenant provisioning
        run: |
          system_user_id="$(docker exec az_erp_postgres psql -U az_erp -d az_erp -qAtX -v ON_ERROR_STOP=1 -c "INSERT INTO platform.system_users (nome, email, login, senha_hash, role, status) VALUES ('CI Provisioning', 'ci.provisioning@azerp.com', 'ci.provisioning', '\$2a\$10\$012345678901234567890uC8wN9QnAyY1Q0xF7v6V8M9dWQjG1z6K', 'ADMIN_SISTEMA', 'ATIVO') RETURNING id;" | head -n 1 | tr -d '[:space:]')"
          tenant_suffix="$(date +%Y%m%d%H%M%S)"
          tenant_code="TENANTCI${tenant_suffix}"
          database_name="tenant_ci_${tenant_suffix}"
          tenant_document="$(date +%y%m%d%H%M%S)90"
          admin_password="SenhaCITenant123"
          token="$(SYSTEM_USER_ID="${system_user_id}" python - <<'PY'
          import base64
          import hashlib
          import hmac
          import json
          import os
          import time

          def b64url(data: bytes) -> str:
              return base64.urlsafe_b64encode(data).rstrip(b"=").decode("ascii")

          issued_at = int(time.time())
          expires_at = issued_at + 28800

          header = {"alg": "HS256", "typ": "JWT"}
          payload = {
              "iss": "az-erp-backend",
              "sub": "ci.provisioning",
              "userId": int(os.environ["SYSTEM_USER_ID"]),
              "role": "ADMIN_SISTEMA",
              "scope": "master",
              "iat": issued_at,
              "exp": expires_at,
          }

          header_b64 = b64url(json.dumps(header, separators=(",", ":")).encode("utf-8"))
          payload_b64 = b64url(json.dumps(payload, separators=(",", ":")).encode("utf-8"))
          unsigned = f"{header_b64}.{payload_b64}"
          signature = hmac.new(
              b"change-me-in-real-env",
              unsigned.encode("utf-8"),
              hashlib.sha256,
          ).digest()
          print(f"{unsigned}.{b64url(signature)}")
          PY
          )"

          provision_payload="$(cat <<EOF
          {
            "systemUserId": ${system_user_id},
            "codigo": "${tenant_code}",
            "nome": "Tenant CI ${tenant_suffix}",
            "nomeFantasia": "Tenant CI",
            "documento": "${tenant_document}",
            "tipoDocumento": "CNPJ",
            "emailResponsavel": "owner.ci@azerp.com",
            "telefoneResponsavel": "71999999999",
            "plano": "PROFESSIONAL",
            "databaseName": "${database_name}",
            "dbHost": "postgres",
            "dbPort": 5432,
            "dbUsername": "az_erp",
            "dbPassword": "az_erp",
            "adminNome": "Admin CI",
            "adminEmail": "admin.ci@tenant.com",
            "adminLogin": "admin.ci",
            "adminSenha": "${admin_password}"
          }
          EOF
          )"

          curl --fail-with-body -s \
            -X POST "http://localhost:8080/api/platform/tenantProvisioning" \
            -H "Authorization: Bearer ${token}" \
            -H "Content-Type: application/json" \
            -d "${provision_payload}" \
            | tee tenant_provisioning_response.json

          grep -q "\"tenantStatus\":\"ATIVO\"" tenant_provisioning_response.json
          grep -q "\"provisionStatus\":\"ATIVO\"" tenant_provisioning_response.json
          grep -q "\"TENANT_APP_USER_CREATED\"" tenant_provisioning_response.json

          tenant_login_payload="$(cat <<EOF
          {
            "tenantCode": "${tenant_code}",
            "login": "admin.ci",
            "senha": "${admin_password}"
          }
          EOF
          )"

          curl --fail-with-body -s \
            -X POST "http://localhost:8080/api/tenant/auth/login" \
            -H "Content-Type: application/json" \
            -d "${tenant_login_payload}" \
            | tee tenant_login_response.json

          grep -q "\"scope\":\"tenant\"" tenant_login_response.json
          grep -q "\"login\":\"admin.ci\"" tenant_login_response.json

      - name: Print running containers
        if: always()
        run: docker compose ps

      - name: Capture Docker logs
        if: always()
        run: |
          docker compose logs backend > backend-docker.log
          docker compose logs postgres > postgres-docker.log

      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-docker-logs
          path: |
            backend/backend-docker.log
            backend/postgres-docker.log
            backend/template_registry.txt
            backend/tenant_provisioning_response.json
            backend/tenant_login_response.json

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v
