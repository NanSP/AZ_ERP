name: Backend CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Run unit tests
        run: ./mvnw test

  docker-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Docker stack
        run: docker compose up --build -d

      - name: Wait for backend startup
        run: |
          for i in {1..24}; do
            if docker compose logs backend | grep -q "Started BackendApplication"; then
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not finish startup in time"
          docker compose logs backend
          exit 1

      - name: Verify template registry bootstrap
        run: |
          docker exec az_erp_postgres psql -U az_erp -d az_erp -Atc \
            "select current_version || '|' || status from platform.template_registry where database_name = 'az_erp_template';" \
            | tee template_registry.txt
          grep -q "READY" template_registry.txt

      - name: Print running containers
        if: always()
        run: docker compose ps

      - name: Capture Docker logs
        if: always()
        run: |
          docker compose logs backend > backend-docker.log
          docker compose logs postgres > postgres-docker.log

      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-docker-logs
          path: |
            backend/backend-docker.log
            backend/postgres-docker.log
            backend/template_registry.txt

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v
