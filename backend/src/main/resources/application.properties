spring.application.name=backend
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${PORT:${SERVER_PORT:8080}}
server.address=0.0.0.0

app.security.allowed-origins=${APP_SECURITY_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173,https://az-erp.vercel.app}
app.security.data-encryption-key=${APP_SECURITY_DATA_ENCRYPTION_KEY:${JWT_SECRET:dev-only-change-me}}
app.privacy.retention.cron=${APP_PRIVACY_RETENTION_CRON:0 30 2 * * *}
app.privacy.retention.action-logs-days=${APP_PRIVACY_RETENTION_ACTION_LOGS_DAYS:180}
app.privacy.retention.error-logs-days=${APP_PRIVACY_RETENTION_ERROR_LOGS_DAYS:90}
app.privacy.retention.provisioning-logs-days=${APP_PRIVACY_RETENTION_PROVISIONING_LOGS_DAYS:180}
app.privacy.retention.sessions-days=${APP_PRIVACY_RETENTION_SESSIONS_DAYS:30}
app.privacy.retention.inactive-devices-days=${APP_PRIVACY_RETENTION_INACTIVE_DEVICES_DAYS:90}

spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

info.app.name=AZ ERP Backend
info.app.description=Backend multi-tenant do AZ ERP
info.app.version=@project.version@
management.info.env.enabled=true
