spring.application.name=backend
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
app.security.allowed-origins=${APP_SECURITY_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173,https://az-erp.vercel.app}

spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

info.app.name=AZ ERP Backend
info.app.description=Backend multi-tenant do AZ ERP
info.app.version=@project.version@
management.info.env.enabled=true
