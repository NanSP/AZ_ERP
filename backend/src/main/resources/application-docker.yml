server:
  port: ${SERVER_PORT:8080}

spring:
  flyway:
    locations: classpath:db/migration/master
    enabled: true

  jpa:
    hibernate:
      ddl-auto: none

  mvc:
    servlet:
      path: /api

app:
  datasource:
    master:
      host: ${MASTER_DB_HOST:postgres}
      port: ${MASTER_DB_PORT:5432}
      database: ${MASTER_DB_NAME:az_erp}
      username: ${MASTER_DB_USERNAME:az_erp}
      password: ${MASTER_DB_PASSWORD:az_erp}

    template:
      host: ${TEMPLATE_DB_HOST:postgres}
      port: ${TEMPLATE_DB_PORT:5432}
      database: ${TEMPLATE_DB_NAME:az_erp_template}
      username: ${TEMPLATE_DB_USERNAME:az_erp}
      password: ${TEMPLATE_DB_PASSWORD:az_erp}

  security:
    jwt:
      secret: ${JWT_SECRET}
      issuer: ${JWT_ISSUER:az-erp-backend}
      expiration-hours: ${JWT_EXPIRATION_HOURS:8}

  bootstrap:
    master:
      enabled: ${BOOTSTRAP_MASTER_ENABLED:false}
      nome: ${BOOTSTRAP_MASTER_NAME:Administrador Master}
      email: ${BOOTSTRAP_MASTER_EMAIL:}
      login: ${BOOTSTRAP_MASTER_LOGIN:}
      password: ${BOOTSTRAP_MASTER_PASSWORD:}
      force-password-change: ${BOOTSTRAP_MASTER_FORCE_PASSWORD_CHANGE:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    root: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    com.example.backend: INFO
