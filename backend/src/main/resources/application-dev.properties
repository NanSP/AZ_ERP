server.port=${SERVER_PORT:8081}

spring.flyway.locations=classpath:db/migration/master
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=none
spring.mvc.servlet.path=/api

spring.datasource.url=jdbc:postgresql://${MASTER_DB_HOST:localhost}:${MASTER_DB_PORT:5432}/${MASTER_DB_NAME:az_erp_master_db}
spring.datasource.username=${MASTER_DB_USERNAME}
spring.datasource.password=${MASTER_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

app.datasource.template.host=${TEMPLATE_DB_HOST:localhost}
app.datasource.template.port=${TEMPLATE_DB_PORT:5432}
app.datasource.template.database=${TEMPLATE_DB_NAME:az_erp_template}
app.datasource.template.username=${TEMPLATE_DB_USERNAME}
app.datasource.template.password=${TEMPLATE_DB_PASSWORD}

app.datasource.master.host=${MASTER_DB_HOST:localhost}
app.datasource.master.port=${MASTER_DB_PORT:5432}
app.datasource.master.database=${MASTER_DB_NAME:az_erp_master_db}
app.datasource.master.username=${MASTER_DB_USERNAME}
app.datasource.master.password=${MASTER_DB_PASSWORD}

app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.issuer=${JWT_ISSUER:az-erp-backend}
app.security.jwt.expiration-hours=${JWT_EXPIRATION_HOURS:8}

app.bootstrap.dev.enabled=true
app.bootstrap.dev.master-admin-password=${DEV_MASTER_ADMIN_PASSWORD:admin123}
app.bootstrap.dev.tenant-technical-password=${DEV_TENANT_TECHNICAL_PASSWORD:admin123}
app.bootstrap.dev.tenant-admin-password=${DEV_TENANT_ADMIN_PASSWORD:admin123}
app.bootstrap.dev.tenant-user-password=${DEV_TENANT_USER_PASSWORD:user123}
