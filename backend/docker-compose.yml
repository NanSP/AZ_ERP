services:
  postgres:
    image: postgres:16
    container_name: az_erp_postgres
    environment:
      POSTGRES_DB: az_erp
      POSTGRES_USER: az_erp
      POSTGRES_PASSWORD: az_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U az_erp -d az_erp"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: az_erp_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080

      MASTER_DB_HOST: postgres
      MASTER_DB_PORT: 5432
      MASTER_DB_NAME: az_erp
      MASTER_DB_USERNAME: az_erp
      MASTER_DB_PASSWORD: az_erp

      TEMPLATE_DB_HOST: postgres
      TEMPLATE_DB_PORT: 5432
      TEMPLATE_DB_NAME: az_erp_template
      TEMPLATE_DB_USERNAME: az_erp
      TEMPLATE_DB_PASSWORD: az_erp

      JWT_SECRET: change-me-in-real-env
      JWT_ISSUER: az-erp-backend
      JWT_EXPIRATION_HOURS: 8
    ports:
      - "8080:8080"

volumes:
  postgres_data:
