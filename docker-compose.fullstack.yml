services:
  postgres:
    image: postgres:16
    container_name: az_erp_postgres_fullstack
    environment:
      POSTGRES_DB: az_erp
      POSTGRES_USER: az_erp
      POSTGRES_PASSWORD: az_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_fullstack_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U az_erp -d az_erp"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: az_erp_backend_fullstack
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      MASTER_DB_HOST: postgres
      MASTER_DB_PORT: 5432
      MASTER_DB_NAME: az_erp
      MASTER_DB_USERNAME: az_erp
      MASTER_DB_PASSWORD: az_erp
      TEMPLATE_DB_HOST: postgres
      TEMPLATE_DB_PORT: 5432
      TEMPLATE_DB_NAME: az_erp_template
      TEMPLATE_DB_USERNAME: az_erp
      TEMPLATE_DB_PASSWORD: az_erp
      JWT_SECRET: az-erp-local-dev-secret
      JWT_ISSUER: az-erp-backend
      JWT_EXPIRATION_HOURS: 8
      BOOTSTRAP_MASTER_ENABLED: true
      BOOTSTRAP_MASTER_NAME: Administrador Master
      BOOTSTRAP_MASTER_EMAIL: admin@az-erp.local
      BOOTSTRAP_MASTER_LOGIN: admin.master
      BOOTSTRAP_MASTER_PASSWORD: AdminMaster123
      BOOTSTRAP_MASTER_FORCE_PASSWORD_CHANGE: false
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: az_erp_frontend_fullstack
    depends_on:
      backend:
        condition: service_started
    ports:
      - "4173:8080"

volumes:
  postgres_fullstack_data:
